name: Build and Deploy Observatory

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 372867010033.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: observatory

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-observatory
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::372867010033:role/github-nebula
          role-session-name: GitHubActions-Observatory
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch Supabase config for UI build
        id: supabase
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id nebula/supabase-config --query SecretString --output text)
          echo "url=$(echo "$SECRET" | jq -r .supabase_url)" >> $GITHUB_OUTPUT
          echo "anon_key=$(echo "$SECRET" | jq -r .supabase_anon_key)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (arm64)
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg VITE_SUPABASE_URL=${{ steps.supabase.outputs.url }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ steps.supabase.outputs.anon_key }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Get K3s instance ID
        id: k3s
        run: |
          INSTANCE_ID=$(aws cloudformation list-stack-resources \
            --stack-name NebulaBackendStack \
            --query 'StackResourceSummaries[?ResourceType==`AWS::EC2::Instance` && starts_with(LogicalResourceId, `K3sServer`) && (ResourceStatus==`CREATE_COMPLETE` || ResourceStatus==`UPDATE_COMPLETE`)].PhysicalResourceId' \
            --output text | tr -s '[:space:]' '\n' | grep -E '^i-[a-z0-9]{8,17}$' | head -n 1)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy to K3s
        run: |
          IMAGE_TAG="${{ steps.build.outputs.image_tag }}"
          INSTANCE_ID="${{ steps.k3s.outputs.instance_id }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'sudo k3s kubectl -n ai-system set image deployment/observatory observatory=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG',
              'sudo k3s kubectl -n ai-system rollout status deployment/observatory --timeout=300s',
              'echo Deploy complete'
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Deploy command: $COMMAND_ID"

          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' \
                --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            sleep 5
          done
