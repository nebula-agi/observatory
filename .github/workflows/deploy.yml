name: Build and Publish Observatory
# Observatory's CI is a pure publisher now: it builds the image on every
# push to main and pushes it to
# 372867010033.dkr.ecr.us-east-1.amazonaws.com/observatory. Rolling out
# to the k3s cluster is owned exclusively by nebula's deploy-manifests
# pipeline, which consumes this image via
# backend/nebula-r2r/deployment/observatory.lock.json. Removing the
# self-rollout path eliminates the dual-writer race between this
# workflow and nebula's deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 372867010033.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: observatory

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: build-observatory
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::372867010033:role/github-nebula
          role-session-name: GitHubActions-Observatory
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch Supabase config for UI build
        id: supabase
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id nebula/supabase-config --query SecretString --output text)
          {
            echo "url=$(echo "$SECRET" | jq -r .supabase_url)"
            echo "anon_key=$(echo "$SECRET" | jq -r .supabase_anon_key)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (arm64)
        id: build
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg VITE_SUPABASE_URL=${{ steps.supabase.outputs.url }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ steps.supabase.outputs.anon_key }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
